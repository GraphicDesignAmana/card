<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع بطاقات التخرج الاحترافي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #e6ded4; 
        }
        .preview-card {
            background: #fffdf9;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 md:p-8">

    <!-- حاوية مرنة مخصصة للجوال لمنع تداخل النصوص والتحكم -->
    <div class="w-full max-w-5xl flex flex-col lg:flex-row gap-6 items-center lg:items-stretch justify-center my-auto">
        
        <!-- القسم الأيسر: معاينة بطاقة التخرج بالأبعاد الأصلية الكاملة لتجنب الاقتصاص والزوم -->
        <div class="w-full max-w-[360px] flex flex-col items-center">
            <div class="preview-card p-3 w-full border border-white/40">
                <!-- تم ضبط الـ viewBox هنا بدقة متناهية ليطابق نسبة أبعاد الصورة الطولية الكاملة بدون أي قص -->
                <div id="card-container" class="relative w-full rounded-xl overflow-hidden shadow-lg border border-gray-200 bg-slate-800">
                    <svg id="card-svg" viewBox="0 0 640 1136" class="w-full h-auto block" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <!-- لون ذهبي متناغم وساطع للكتابة يطابق لون التصميم الأصلي -->
                            <linearGradient id="gold-text" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#ffe8b3;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#dcb36c;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#b58d43;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        
                        <!-- سحب الصورة باستخدام خاصية fill لكي تظهر كاملة بحدودها الأصلية دون تكبير مشوه للحروف -->
                        <image href="https://www2.0zz0.com/2026/07/13/11/519028591.png" width="640" height="1136" x="0" y="0" preserveAspectRatio="xMidYMid fill" crossorigin="anonymous"/>
                        
                        <!-- الاسم: يمكنك التحكم بموقعه وحجمه بسهولة -->
                        <text id="svg-name-target" x="320" y="730" text-anchor="middle" fill="url(#gold-text)" font-size="52" font-weight="900">أمجاد</text>
                    </svg>
                </div>
            </div>
        </div>

        <!-- القسم الأيمن: لوحة التحكم المحدثة لتكون متجاوبة 100% مع الجوالات بدون تداخل -->
        <div class="w-full max-w-[400px] bg-[#fffdf9]/95 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/60 flex flex-col justify-between">
            <div>
                <span class="text-xs font-bold text-amber-700 bg-amber-100 px-3 py-1 rounded-full w-max block mb-3">أداة التخصيص الذكية</span>
                
                <h1 class="text-2xl md:text-3xl font-black text-[#1f160e] leading-tight mb-2">
                    اكتب اسم الخريج
                </h1>
                
                <p class="text-xs text-gray-600 mb-4 leading-relaxed">
                    أدخل الاسم، واستخدم شريط التحكم لتحريك الاسم ليتناسب مع الفراغ المتاح في صورتك الأصلية الكاملة.
                </p>
                
                <!-- حقل الإدخال -->
                <div class="mb-4">
                    <label for="name-input" class="block text-xs font-bold text-gray-700 mb-1">اسم الخريج / الخريجة</label>
                    <input type="text" id="name-input" value="أمجاد" placeholder="اكتب الاسم هنا..." class="w-full px-3 py-2 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-600 text-sm font-medium transition">
                </div>

                <!-- شريط التحكم في موقع الاسم (عمودياً Y) -->
                <div class="mb-3">
                    <div class="flex justify-between text-xs font-bold text-gray-700 mb-1">
                        <label for="position-y">موقع الاسم (لأعلى ولأسفل)</label>
                        <span id="val-y" class="text-amber-800">730</span>
                    </div>
                    <input type="range" id="position-y" min="200" max="1100" value="730" class="w-full accent-amber-700">
                </div>

                <!-- شريط التحكم في حجم الخط -->
                <div class="mb-4">
                    <div class="flex justify-between text-xs font-bold text-gray-700 mb-1">
                        <label for="font-size">حجم خط الاسم</label>
                        <span id="val-size" class="text-amber-800">52px</span>
                    </div>
                    <input type="range" id="font-size" min="20" max="110" value="52" class="w-full accent-amber-700">
                </div>
            </div>

            <!-- أزرار العمليات -->
            <div class="space-y-2 mt-2">
                <div class="flex gap-2">
                    <button id="btn-update" class="w-1/2 bg-[#3a4847] hover:bg-[#2e3a39] text-white text-xs font-bold py-3 px-2 rounded-xl transition shadow-md">
                        تحديث المعاينة
                    </button>
                    <button id="btn-download" class="w-1/2 bg-[#b58d43] hover:bg-[#9c7634] text-white text-xs font-bold py-3 px-2 rounded-xl transition shadow-md">
                        تحميل بطاقة PNG
                    </button>
                </div>
                <button id="btn-clear" class="w-full bg-transparent border border-gray-300 hover:bg-gray-100 text-gray-500 text-xs font-medium py-2 rounded-xl transition">
                    مسح الاسم
                </button>
                <div class="text-center">
                    <span id="status-msg" class="text-xs text-emerald-700 font-medium hidden">✓ جاهز للتحميل.</span>
                </div>
            </div>
        </div>

    </div>

    <!-- جافا سكريبت التفاعلية -->
    <script>
        const nameInput = document.getElementById('name-input');
        const svgNameTarget = document.getElementById('svg-name-target');
        const positionY = document.getElementById('position-y');
        const fontSize = document.getElementById('font-size');
        const valY = document.getElementById('val-y');
        const valSize = document.getElementById('val-size');
        
        const btnUpdate = document.getElementById('btn-update');
        const btnDownload = document.getElementById('btn-download');
        const btnClear = document.getElementById('btn-clear');

        nameInput.addEventListener('input', () => {
            svgNameTarget.textContent = nameInput.value.trim() || "أمجاد";
        });

        positionY.addEventListener('input', (e) => {
            const yValue = e.target.value;
            svgNameTarget.setAttribute('y', yValue);
            valY.textContent = yValue;
        });

        fontSize.addEventListener('input', (e) => {
            const sizeValue = e.target.value;
            svgNameTarget.setAttribute('font-size', sizeValue);
            valSize.textContent = sizeValue + 'px';
        });

        btnUpdate.addEventListener('click', () => {
            svgNameTarget.textContent = nameInput.value.trim() || "أمجاد";
        });

        btnClear.addEventListener('click', () => {
            nameInput.value = '';
            svgNameTarget.textContent = "أمجاد";
        });

        btnDownload.addEventListener('click', () => {
            const svgElement = document.getElementById('card-svg');
            const svgString = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const URL = window.URL || window.webkitURL || window;
            const blobURL = URL.createObjectURL(svgBlob);
            
            const image = new Image();
            image.crossOrigin = 'anonymous'; 
            
            image.onload = () => {
                const canvas = document.createElement('canvas');
                // حفظ الصورة بدقتها الأصلية الكاملة عند التحميل لتكون واضحة جداً
                canvas.width = 640;  
                canvas.height = 1136; 
                const context = canvas.getContext('2d');
                
                context.drawImage(image, 0, 0, 640, 1136);
                
                try {
                    const pngURL = canvas.toDataURL('image/png');
                    const downloadLink = document.createElement('a');
                    downloadLink.href = pngURL;
                    downloadLink.download = `بطاقة_تخرج_${nameInput.value.trim() || 'مخصصة'}.png`;
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                } catch (err) {
                    alert('يرجى التحميل من المتصفح مباشرة.');
                    console.error(err);
                }
            };
            image.src = blobURL;
        });
    </script>
</body>
</html>
